<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nail Salon - Agende seuHorário{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% load static %}{% static 'css/styles.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light" style="background: linear-gradient(135deg, #e91e63, #f8bbd0);">
        <div class="container">
            <a class="navbar-brand text-white font-weight-bold" href="{% url 'scheduling:home' %}">
                <i class="fas fa-spa mr-2"></i>Nail Salon
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{% url 'scheduling:home' %}">
                            <i class="fas fa-home mr-1"></i>Início
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="{% url 'scheduling:check_booking' %}">
                            <i class="fas fa-calendar-check mr-1"></i>Meus Agendamentos
                        </a>
                    </li>
                    {% if user.is_staff %}
                        <li class="nav-item">
                            <a class="nav-link text-white" href="{% url 'scheduling:admin_dashboard' %}">
                                <i class="fas fa-cog mr-1"></i>Admin
                            </a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-5 py-4 text-white text-center" style="background: linear-gradient(135deg, #e91e63, #f8bbd0);">
        <div class="container">
            <p class="mb-0"><i class="fas fa-spa mr-2"></i>Nail Salon &copy; 2024</p>
        </div>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
